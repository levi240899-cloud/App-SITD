<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SITD Darussunnah</title>
  
  <meta name="theme-color" content="#800000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SITD Darussunnah">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5401/5401821.png">
  
  <link rel="manifest" href="manifest.json">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl)
          .then(reg => console.log('Service Worker aktif!'))
          .catch(err => console.log('SW Gagal:', err));
      });
    }
  </script>
</head>
<body style="background-color: #4a0e17; color: white; font-family: sans-serif; text-align: center; padding: 50px;">

  <h1>SITD Darussunnah</h1>
  <p>Sistem Informasi Teknologi Digital sedang dalam pengembangan.</p>

</body>
</html>
